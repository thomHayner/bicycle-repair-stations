name: PR title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  semantic-pr-title:
    name: Validate PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types — must match commitlint.config.mjs `type-enum`.
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # Subject must not start with an uppercase letter or end with a period —
          # matches commitlint `subject-case` and `subject-full-stop` rules.
          # Quoted because the unquoted form contains `: ` which YAML would
          # parse as a mapping separator, breaking the workflow file.
          subjectPattern: "^(?![A-Z])(?!.*\\.$).+$"
          subjectPatternError: |
            The PR title subject must start with a lowercase letter and must not end with a period.
            Conventional Commits format: <type>(<scope>): <subject>
            See CONTRIBUTING.md#commit-messages.
          # We don't enforce a closed scope list at the PR-title layer (commitlint warns on it).
          requireScope: false
          # `!` is non-capturing so the default headerPatternCorrespondence
          # ([type, scope, subject]) lines up with capture groups 1/2/3.
          # Making `!` a capturing group shifts `subject` onto the `!` match
          # and fails otherwise-valid breaking-change titles. (Caught by
          # Copilot on PR #27.)
          # Quoted because the unquoted form contains `: ` which YAML would
          # parse as a mapping separator, breaking the workflow file.
          headerPattern: "^(\\w+)(?:\\(([^)]+)\\))?(?:!)?: (.+)$"
