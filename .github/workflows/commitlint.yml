name: Commitlint

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so commitlint can scan every commit in the PR.
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.js
