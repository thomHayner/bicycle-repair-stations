name: PR title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  semantic-pr-title:
    name: Validate PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types — must match commitlint.config.js `type-enum`.
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # Subject must not start with an uppercase letter or end with a period —
          # matches commitlint `subject-case` and `subject-full-stop` rules.
          subjectPattern: ^(?![A-Z])(?!.*\.$).+$
          subjectPatternError: |
            The PR title subject must start with a lowercase letter and must not end with a period.
            Conventional Commits format: <type>(<scope>): <subject>
            See CONTRIBUTING.md#commit-messages.
          # We don't enforce a closed scope list at the PR-title layer (commitlint warns on it).
          requireScope: false
          # Total title length cap — commitlint enforces 72 on commits; we cap PR titles too.
          headerPattern: ^(\w+)(?:\(([^)]+)\))?(!)?: (.+)$
