name: Feature Request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is your request related to a frustration? Describe it.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area of the app
      options:
        - Map / markers
        - Station list
        - Search / geolocation
        - Repair Guides
        - Settings / preferences
        - Accessibility
        - Performance / PWA
        - Other
    validations:
      required: false
